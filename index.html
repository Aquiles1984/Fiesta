/* ================== utilidades ================== */
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function genId(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function genCode(){return String(Math.floor(1000+Math.random()*9000));}
function shOpts(o,a){const t=o[a];const s=shuffle(o);return{o:s,a:s.indexOf(t)};}
function pickFresh(bank,n,used){used=used||[];const u=new Set(used);let av=bank.filter(x=>!u.has(x));if(av.length<n){used.length=0;av=[...bank];}const ch=shuffle(av).slice(0,n);ch.forEach(c=>used.push(c));return{chosen:ch,used};}

// Elige n preguntas repartidas entre TODAS las categorías disponibles antes de repetir ninguna
// (evita que una partida salga "toda de Historia" o "toda de Música").
function pickDiverseTrivia(n, usedArr){
  usedArr = usedArr || [];
  const used = new Set(usedArr);
  let avail = QUESTION_BANK.filter(q => !used.has(q.q));
  if (avail.length < n) { usedArr.length = 0; avail = [...QUESTION_BANK]; }
  const byCat = {};
  shuffle(avail).forEach(q => { (byCat[q.c] = byCat[q.c] || []).push(q); });
  let cats = shuffle(Object.keys(byCat));
  const chosen = [];
  while (chosen.length < n) {
    let picked = false;
    for (const c of cats) {
      if (chosen.length >= n) break;
      if (byCat[c].length) { chosen.push(byCat[c].shift()); picked = true; }
    }
    if (!picked) break; // se han agotado todas las categorías disponibles
    cats = shuffle(cats);
  }
  chosen.forEach(q => usedArr.push(q.q));
  return { chosen, used: usedArr };
}

// Igual que arriba pero por compositor/estilo de las melodías, con tope de 1 por compositor
// mientras haya compositores distintos disponibles (evita "todo Beethoven").
function pickDiverseMusic(n, usedArr){
  usedArr = usedArr || [];
  const used = new Set(usedArr);
  let avail = MUSIC_BANK.filter(m => !used.has(m.song));
  if (avail.length < n) { usedArr.length = 0; avail = [...MUSIC_BANK]; }
  const byComp = {};
  shuffle(avail).forEach(m => { (byComp[m.comp] = byComp[m.comp] || []).push(m); });
  let comps = shuffle(Object.keys(byComp));
  const chosen = [];
  while (chosen.length < n) {
    let picked = false;
    for (const c of comps) {
      if (chosen.length >= n) break;
      if (byComp[c].length) { chosen.push(byComp[c].shift()); picked = true; }
    }
    if (!picked) break;
    comps = shuffle(comps);
  }
  chosen.forEach(m => usedArr.push(m.song));
  return { chosen, used: usedArr };
}

// Reparte una lista de "turnos" (cada uno con un pid) en un orden aleatorio
// pero SIN que el mismo jugador aparezca en dos posiciones seguidas.
function noConsecutiveShuffleBy(items, keyFn){
  const buckets={};
  items.forEach(it=>{ const k=keyFn(it); (buckets[k]=buckets[k]||[]).push(it); });
  Object.keys(buckets).forEach(k=>{ buckets[k]=shuffle(buckets[k]); });
  const result=[]; let lastKey=null;
  let remaining=Object.keys(buckets).filter(k=>buckets[k].length>0);
  while(remaining.length){
    let pool=shuffle(remaining.filter(k=>k!==lastKey));
    if(pool.length===0) pool=shuffle(remaining); // último recurso
    pool.sort((a,b)=>buckets[b].length-buckets[a].length); // prioriza al que le quedan más
    const maxLeft=buckets[pool[0]].length;
    const top=pool.filter(k=>buckets[k].length===maxLeft);
    const chosen=top[Math.floor(Math.random()*top.length)];
    result.push(buckets[chosen].shift());
    lastKey=chosen;
    remaining=Object.keys(buckets).filter(k=>buckets[k].length>0);
  }
  return result;
}
function noConsecutiveShuffle(items){ return noConsecutiveShuffleBy(items, it=>it.pid); }

function buildPlan(players,hist){
  const h=hist||{};['mimica','cantar','dibujar','reto','trivia','musica'].forEach(k=>{if(!Array.isArray(h[k]))h[k]=[];});
  const perfCats=['mimica','cantar','dibujar','reto'];
  const banks={mimica:MIMICA_BANK,cantar:CANTAR_BANK,dibujar:DIBUJAR_BANK,reto:RETO_BANK};
  const passes = players.length<=5?3:(players.length<=8?2:1);
  let perf=[];
  for(let pass=0;pass<passes;pass++){
    const sp=shuffle(players), sc=shuffle(perfCats);
    sp.forEach((p,idx)=>{const cat=sc[idx%sc.length];const r=pickFresh(banks[cat],1,h[cat]);h[cat]=r.used;perf.push({type:cat,pid:p.id,pname:p.name,prompt:r.chosen[0]});});
  }
  perf=noConsecutiveShuffle(perf);

  // el total de preguntas+música va ligado al número de actuaciones, para que la partida
  // quede equilibrada (ni un aluvión de música ni una partida eterna de preguntas)
  const quizTotal = Math.min(18, Math.max(8, Math.round(perf.length*0.9)));
  const musicCount = Math.min(2, Math.max(1, Math.round(quizTotal*0.15))); // tope DURO: nunca más de 2 rondas de música por partida
  const triviaCount = quizTotal - musicCount;

  const tq=pickDiverseTrivia(triviaCount,h.trivia);h.trivia=tq.used;
  const trivia=tq.chosen.map(q=>{const s=shOpts(q.o,q.a);return{type:'trivia',category:q.c,question:q.q,options:s.o,correct:s.a};});
  const ms=pickDiverseMusic(musicCount,h.musica);h.musica=ms.used;
  const music=ms.chosen.map(m=>{const s=shOpts(m.o,m.a);return{type:'musica',song:m.song,melody:m.m,options:s.o,correct:s.a};});
  // reparto sin dos rondas de música seguidas (antes un shuffle a secas podía dejarlas todas pegadas al final)
  const quiz=noConsecutiveShuffleBy([...trivia,...music], it=>it.type);

  const total=perf.length+quiz.length;
  const qpos=new Set();for(let k=0;k<quiz.length;k++)qpos.add(Math.round((k+0.5)*total/quiz.length));
  const plan=[];let pi=0,qi=0;
  for(let i=0;i<total;i++){if(qpos.has(i)&&qi<quiz.length)plan.push(quiz[qi++]);else if(pi<perf.length)plan.push(perf[pi++]);else if(qi<quiz.length)plan.push(quiz[qi++]);}
  return{plan:plan.map((r,i)=>({...r,id:i})),history:h};
}

let audioCtx=null;
function playMelody(melody){
  try{
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    let t=audioCtx.currentTime+0.05,total=0.05;
    melody.forEach(([f,d])=>{
      if(f>0){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.28,t+0.03);g.gain.exponentialRampToValueAtTime(0.0001,t+d*0.9);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+d);}
      t+=d;total+=d;
    });
    state.playingUntil=Date.now()+total*1000;render();
  }catch(e){}
}

async function createRoom(){

async function joinRoom(){

  onDisconnect(playerRef(code,state.playerId)).remove();
  state.roomCode=code; state.busy=false; state.screen='room'; subscribeRoom(code); render();
}
function playersArr(meta){
  const src = (meta && meta.players) ? meta.players : (state.lobbyPlayers || {});
  return Object.values(src).sort((a,b)=>(a.joinedAt||0)-(b.joinedAt||0));
}

async function startGame(){
  const meta=state.meta; if(!meta)return;

  if(players.length<2)return;

  const playersObj={}; players.forEach(p=>playersObj[p.id]={...p,score:0});
  await update(metaRef(state.roomCode), {players:playersObj,phase:'round',history,plan,currentRound:0,totalRounds:plan.length,sub:'intro',introAt:Date.now(),lastResult:null});
}
async function playAgain(){
  const meta=state.meta; if(!meta)return;
  const players=playersArr(meta).map(p=>({...p,score:0}));
  const {plan,history}=buildPlan(players,meta.history);
  const playersObj={}; players.forEach(p=>playersObj[p.id]=p);

/* ================== avance de la partida ================== */
/* Lo ejecutan TODOS los clientes (no solo el anfitrión), con transacciones
   para que nunca se procese dos veces. Así, si un móvil se bloquea, cualquier
   otro que esté despierto hace avanzar la partida y no se cuelga. */
function subscribeRoom(code){
  if(roomUnsub)roomUnsub();
  roomUnsub = onValue(roomRef(code), snap=>{
    const room = snap.val() || {};
    state.meta = room.meta || null;
    state.lobbyPlayers = room.players || {};
    render();
    advance(); // cada cambio en la sala dispara una comprobación
  });
  if(hostTimer)clearInterval(hostTimer);
  hostTimer = setInterval(advance, 600); // respaldo para los tiempos límite
}

let advancing = false;
async function advance(){
  if(advancing) return;
  const meta=state.meta;
  if(!meta || meta.phase!=='round' || !meta.plan) return;
  const round=meta.plan[meta.currentRound];
  if(!round) return;
  const t=Date.now();
  const isQuiz=round.type==='trivia'||round.type==='musica';
  const code=state.roomCode, g=meta.gameId||1, cr=meta.currentRound;

  try{
    advancing = true;

    if(meta.sub==='intro'){
      if(meta.introAt && t-meta.introAt>INTRO_MS){
        await runTransaction(metaRef(code), m=>{
          if(!m || m.phase!=='round' || m.sub!=='intro' || m.currentRound!==cr) return; // ya avanzó
          m.sub='active'; m.activeAt=Date.now(); return m;
        });
      }
      return;
    }

    if(meta.sub==='active'){
      const players=playersArr(meta);
      if(isQuiz){
        const snap=await get(ref(db,'rooms/'+code+'/g'+g+'/ans/'+cr));
        const ans=snap.exists()?snap.val():{};
        const list=Object.keys(ans).map(pid=>({pid,...ans[pid]}));
        const allAns=players.length>0 && list.length>=players.length;
        const timeUp=meta.activeAt && t-meta.activeAt>(round.type==='musica'?MUSIC_MS:TRIVIA_MS);
        if(allAns||timeUp){
          const sorted=list.sort((a,b)=>a.at-b.at); const bonus=[50,30,20]; let rank=0; const deltas={};
          sorted.forEach(a=>{ if(a.o===round.correct){ deltas[a.pid]=100+(bonus[rank]!==undefined?bonus[rank]:10); rank++; } else deltas[a.pid]=0; });
          await runTransaction(metaRef(code), m=>{
            if(!m || m.sub!=='active' || m.currentRound!==cr) return; // otro cliente ya lo hizo
            const pl=m.players||{};
            Object.keys(deltas).forEach(pid=>{ if(pl[pid]) pl[pid].score=(pl[pid].score||0)+deltas[pid]; });
            m.players=pl; m.sub='reveal'; m.revealAt=Date.now(); m.lastResult={type:round.type,deltas};
            return m;
          });
        }
      } else {
        const dur=round.type==='reto'?RETO_MS:PERFORM_MS;
        const snap=await get(resRef(code,g,cr));
        const res=snap.exists()?snap.val():null;
        const timeUp=meta.activeAt && t-meta.activeAt>dur;
        if(res||timeUp){
          const success=res?!!res.success:false;
          const guesserId=(res&&res.guesserId)?res.guesserId:null;
          const deltas={};
          if(round.type==='reto'){ if(success) deltas[round.pid]=100; }
          else if(success&&guesserId){ deltas[guesserId]=80; deltas[round.pid]=(deltas[round.pid]||0)+60; }
          // lastResult SIN campos undefined (eso rompía Firebase y colgaba la partida)
          const lastResult={type:round.type, success:success, deltas:deltas};
          if(guesserId) lastResult.guesserId=guesserId;
          await runTransaction(metaRef(code), m=>{
            if(!m || m.sub!=='active' || m.currentRound!==cr) return;
            const pl=m.players||{};
            Object.keys(deltas).forEach(pid=>{ if(pl[pid]) pl[pid].score=(pl[pid].score||0)+deltas[pid]; });
            m.players=pl; m.sub='reveal'; m.revealAt=Date.now(); m.lastResult=lastResult;
            return m;
          });
        }
      }
      return;
    }

    if(meta.sub==='reveal'){
      if(meta.revealAt && t-meta.revealAt>REVEAL_MS){
        await runTransaction(metaRef(code), m=>{
          if(!m || m.sub!=='reveal' || m.currentRound!==cr) return;
          const next=m.currentRound+1;
          if(next>=m.totalRounds){ m.phase='end'; }
          else { m.currentRound=next; m.sub='intro'; m.introAt=Date.now(); m.activeAt=null; m.revealAt=null; m.lastResult=null; }
          return m;
        });
      }
    }
  }catch(e){ /* si una transacción falla, se reintenta en el siguiente ciclo */ }
  finally{ advancing=false; }
}

/* ================== reloj para animar barra ================== */
/* Actualiza SOLO el temporizador (sin reconstruir toda la pantalla) para que no salte ni vaya a trompicones */
function tickTimer(){
  if(state.screen!=='room' || !state.meta || state.meta.phase!=='round') return;
  const meta=state.meta;
  if(meta.sub!=='active'){
    // fuera de la fase activa solo hace falta refrescar el botón de "sonando" si procede
    return;
  }
  const round=meta.plan[meta.currentRound]; if(!round) return;
  const dur=round.type==='trivia'?TRIVIA_MS:round.type==='musica'?MUSIC_MS:round.type==='reto'?RETO_MS:PERFORM_MS;
  const rem=Math.max(0,dur-(Date.now()-(meta.activeAt||Date.now())));
  const pct=Math.max(0,Math.min(100,rem/dur*100));
  const secs=Math.ceil(rem/1000);
  const fill=document.getElementById('timerFill');
  const secsEl=document.getElementById('timerSecs');
  if(fill) fill.style.width=pct+'%';
  if(secsEl) secsEl.textContent=secs+'s';
  const label=document.getElementById('playBtnLabel');
  if(label){ const playing=Date.now()<state.playingUntil; label.textContent=playing?'Sonando…':'Reproducir melodía'; }
}

function renderRound(meta,isHost,players){
  const round=meta.plan[meta.currentRound], cat=CATS[round.type];
  const isPerf=round.type!=='trivia'&&round.type!=='musica';
  const isProt=isPerf&&round.pid===state.playerId;

  }

  if(meta.sub==='active'){
    const dur=round.type==='trivia'?TRIVIA_MS:round.type==='musica'?MUSIC_MS:round.type==='reto'?RETO_MS:PERFORM_MS;
    const rem=Math.max(0,dur-(Date.now()-(meta.activeAt||Date.now())));
    const pct=Math.max(0,Math.min(100,rem/dur*100));
    const secs=Math.ceil(rem/1000);
    const optColors=['#E21B3C','#1368CE','#FFA602','#26890C'];

    if(round.type==='trivia'||round.type==='musica'){
      const answered=state.answeredRound===meta.currentRound;
      const isPlaying=Date.now()<state.playingUntil;
      app.innerHTML=`<div class="screen">
        ${dotsHTML(meta)}
        <div class="row-between"><span class="label" style="margin:0;color:${cat.color}">${cat.icon} ${round.type==='trivia'?esc(round.category):cat.label}</span><span id="timerSecs" style="font-weight:600;color:rgba(255,255,255,.6)">${secs}s</span></div>
        <div class="bar"><div id="timerFill" style="width:${pct}%;background:${cat.color};color:${cat.color}"></div></div>
        ${round.type==='musica'
          ? `<div class="center" style="flex:none;margin-bottom:26px"><button class="play-btn" id="playBtn" data-act="play" style="background:${cat.color}">▶️ <span id="playBtnLabel">${isPlaying?'Sonando…':'Reproducir melodía'}</span></button><p style="color:rgba(255,255,255,.6);font-size:14px;margin-top:10px">Que suene en un móvil (subid volumen). ¿Qué canción es?</p></div>`
          : `<h2>${esc(round.question)}</h2>`}
        <div class="opts">${round.options.map((o,i)=>{const sel=state.selectedOption===i;const bg=answered?(sel?optColors[i]:'rgba(255,255,255,.08)'):optColors[i];const col=answered&&!sel?'rgba(255,255,255,.4)':'#fff';return `<button class="opt" data-answer="${i}" ${answered?'disabled':''} style="background:${bg};color:${col}">${esc(o)}</button>`;}).join('')}</div>
        ${answered?'<p style="text-align:center;color:rgba(255,255,255,.6);font-weight:600;margin-top:22px">Respuesta enviada, esperando…</p>':''}
      </div>`;
      return bind();
    }
    if(round.type==='reto'){
      const submitted=state.submittedResult===meta.currentRound;
      app.innerHTML=`<div class="screen">
        ${dotsHTML(meta)}
        <div class="row-between"><span class="label" style="margin:0;color:${cat.color}">${cat.icon} Reto para ${esc(prot.name)}</span><span id="timerSecs" style="font-weight:600;color:rgba(255,255,255,.6)">${secs}s</span></div>
        <div class="bar"><div id="timerFill" style="width:${pct}%;background:${cat.color};color:${cat.color}"></div></div>
        <div class="center" style="flex:1;gap:16px">${avatarHTML(prot,64)}<h2>${esc(round.prompt)}</h2>${!isProt?`<p style="color:rgba(255,255,255,.6);font-weight:600">${cat.hint}</p>`:''}</div>
        ${isProt&&!submitted?`<div style="display:flex;gap:12px"><button class="btn btn-green" data-res="ok">✅ Conseguido</button><button class="btn btn-red" data-res="no">❌ No sale</button></div>`:(isProt?'<p style="text-align:center;color:rgba(255,255,255,.6);font-weight:600">Resultado enviado…</p>':'')}
      </div>`;
      return bind();
    }
    // perform: mimica/cantar/dibujar
    const submitted=state.submittedResult===meta.currentRound;
    const others=players.filter(p=>p.id!==round.pid);
    app.innerHTML=`<div class="screen">
      ${dotsHTML(meta)}
      <div class="row-between"><span class="label" style="margin:0;color:${cat.color}">${cat.icon} ${cat.label}</span><span id="timerSecs" style="font-weight:600;color:rgba(255,255,255,.6)">${secs}s</span></div>
      <div class="bar"><div id="timerFill" style="width:${pct}%;background:${cat.color};color:${cat.color}"></div></div>
      ${isProt
        ? `<p style="color:rgba(255,255,255,.6);font-weight:600;margin-bottom:8px">Esto solo lo ves tú:</p>
           <div class="secret">${esc(round.prompt)}</div>
           ${submitted?'<p style="text-align:center;color:rgba(255,255,255,.6);font-weight:600">Resultado enviado…</p>'
             :`<p style="font-weight:600;margin-bottom:12px">Toca en quién lo adivine primero:</p>
               <div class="guess-grid">${others.map(p=>`<button data-guess="${p.id}">${avatarHTML(p,32)}<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span></button>`).join('')}</div>
               <button class="btn btn-ghost" data-res="no">😅 Nadie lo ha adivinado</button>`}`
        : `<div class="center" style="flex:1;gap:16px"><div style="font-size:40px">🙈</div><p style="font-weight:700;font-size:20px">¡No mires el móvil de ${esc(prot.name)}!</p>${avatarHTML(prot,72)}<p style="color:rgba(255,255,255,.7);font-weight:600">${cat.hint}</p></div>`}
    </div>`;
    return bind();
  }

  if(meta.sub==='reveal'){
    const top3=[...players].sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,3);
    const lr=meta.lastResult||{};
    let banner='';
    if(round.type==='trivia'||round.type==='musica'){
      const my=(lr.deltas&&lr.deltas[state.playerId])||0;
      banner=`${round.type==='musica'?`<p style="text-align:center;font-weight:700;font-size:18px;margin-bottom:14px">🎵 Era: <span style="color:${cat.color}">${esc(round.song)}</span></p>`:''}
        <div class="opts" style="margin-bottom:22px">${round.options.map((o,i)=>{const ok=i===round.correct;const mine=state.selectedOption===i;return `<div class="reveal-opt" style="background:${ok?'#26890C':'rgba(255,255,255,.08)'}"><span>${esc(o)}</span>${ok?'✓':(mine?'✗':'')}</div>`;}).join('')}</div>
        <div class="banner" style="background:${my>0?'#FFA602':'rgba(255,255,255,.08)'}">${my>0?'¡Bien! +'+my+' puntos':'Esta vez no'}</div>`;
    } else if(round.type==='reto'){
      banner=`<div class="banner" style="background:${lr.success?'#26890C':'rgba(255,255,255,.08)'}">${lr.success?'✅ ¡'+esc(prot.name)+' lo consigue! +100':'❌ Reto no conseguido'}</div>`;
    } else {
      const g=lr.guesserId&&players.find(p=>p.id===lr.guesserId);
      banner=`<div class="banner" style="background:${lr.success?'#864CBF':'rgba(255,255,255,.08)'}">${lr.success?'🎉 ¡'+esc(g?g.name:'Alguien')+' acierta! +80 / '+esc(prot.name)+' +60':'😅 Nadie lo ha adivinado'}</div>`;
    }
    app.innerHTML=`<div class="screen">
      ${dotsHTML(meta)}
      <span class="label" style="color:${cat.color}">${cat.icon} ${cat.label}</span>
      <h2>${round.type==='trivia'?esc(round.question):(round.type==='musica'?'¿Qué canción era?':esc(round.prompt))}</h2>
      ${banner}
      <p class="label">🏆 Clasificación</p>
      <div style="display:flex;flex-direction:column;gap:8px">${top3.map((p,i)=>`<div class="rank-row"><div class="l"><span style="opacity:.6;font-weight:600">${i+1}.</span>${avatarHTML(p,30)}<span style="font-weight:600">${esc(p.name)}</span></div><span style="font-weight:900">${p.score||0}</span></div>`).join('')}</div>
    </div>`;
    return bind();
  }
}

function renderEnd(meta,isHost,players){
  const sorted=[...players].sort((a,b)=>(b.score||0)-(a.score||0));
  const w=sorted[0]||{name:'',avatar:'',color:'#888',score:0};
  const rest=sorted.slice(3);
  const order=[sorted[1],sorted[0],sorted[2]];
  const heights=[100,130,80], pc=['#C0C0C0','#F4B740','#CD7F32'], lbl=['2º','1º','3º'];
  app.innerHTML=`<div class="screen center">
    <div style="font-size:44px" class="crown-float">👑</div>
    <p class="label">Ganador</p>
    <h2 style="font-size:34px">${esc(w.name)}</h2>
    <div style="font-size:56px;margin-bottom:6px">${w.avatar}</div>
    <p style="font-weight:900;font-size:24px;color:#F4B740;margin-bottom:24px">${w.score||0} puntos</p>
    <div class="podium">${order.map((p,i)=>p?`<div class="col">${avatarHTML(p,i===1?56:44)}<div style="font-weight:700;font-size:14px;margin:8px 0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%">${esc(p.name)}</div><div class="base" style="background:${pc[i]}55;height:${heights[i]}px">${lbl[i]}</div><div style="font-weight:900;margin-top:4px">${p.score||0}</div></div>`:'').join('')}</div>
    ${rest.length?`<div class="stack" style="margin-bottom:28px">${rest.map((p,i)=>`<div class="rank-row"><div class="l"><span style="opacity:.6;font-weight:600">${i+4}.</span>${avatarHTML(p,28)}<span style="font-weight:600">${esc(p.name)}</span></div><span style="font-weight:900">${p.score||0}</span></div>`).join('')}</div>`:''}
    <div class="stack">
      ${isHost?`<button class="btn btn-red" data-act="again">🔄 Jugar otra vez</button>`:`<p style="text-align:center;color:rgba(255,255,255,.6);font-weight:600">El anfitrión puede empezar otra partida…</p>`}
      <button class="btn btn-ghost" data-act="leave">Salir al inicio</button>
    </div>
  </div>`;
  bind();
}

/* ================== eventos ================== */
function bind(){
  const nameI=document.getElementById('nameInput');
  if(nameI) nameI.oninput=e=>{state.name=e.target.value;};
  const codeI=document.getElementById('codeInput');
  if(codeI) codeI.oninput=e=>{state.codeInput=e.target.value.replace(/\D/g,'').slice(0,4);};

  app.querySelectorAll('[data-act]').forEach(el=>{
    el.onclick=()=>{
      const a=el.getAttribute('data-act');
      if(a==='go-create'){state.mode='create';state.screen='setup';state.error='';render();}
      else if(a==='go-join'){state.mode='join';state.screen='setup';state.error='';render();}
      else if(a==='home'){state.screen='home';state.error='';render();}
      else if(a==='create'){createRoom();}
      else if(a==='join'){joinRoom();}
      else if(a==='start'){startGame();}
      else if(a==='again'){playAgain();}
      else if(a==='leave'){leave();}
      else if(a==='copy'){copyCode();}
      else if(a==='play'){const r=state.meta.plan[state.meta.currentRound];playMelody(r.melody);}
    };
  });
  app.querySelectorAll('[data-emoji]').forEach(el=>el.onclick=()=>{state.avatar=el.getAttribute('data-emoji');render();});
  app.querySelectorAll('[data-color]').forEach(el=>el.onclick=()=>{state.color=el.getAttribute('data-color');render();});
  app.querySelectorAll('[data-answer]').forEach(el=>el.onclick=()=>answer(parseInt(el.getAttribute('data-answer'))));
  app.querySelectorAll('[data-res]').forEach(el=>el.onclick=()=>{const v=el.getAttribute('data-res');submitResult(v==='ok'?{success:true}:{success:false});});
  app.querySelectorAll('[data-guess]').forEach(el=>el.onclick=()=>submitResult({success:true,guesserId:el.getAttribute('data-guess')}));
}

render();
</script>
</body>
</html>
